<!-- ===== THANK YOU PAGE (thank-you.html) ===== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You · Hashir Ahmad</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #080808;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background: radial-gradient(ellipse at 50% 30%, rgba(255, 0, 64, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 70%, rgba(255, 45, 74, 0.05) 0%, transparent 50%),
                  linear-gradient(135deg, #0a0a0a 0%, #100505 50%, #0a0a0a 100%);
      overflow: hidden;
    }
    .thankyou-container {
      max-width: 700px;
      padding: 60px 40px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 0, 64, 0.15);
      box-shadow: 0 0 60px rgba(255, 0, 64, 0.03);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    .thankyou-container::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 32px;
      padding: 2px;
      background: linear-gradient(135deg, #3D0000, #FF0040, #FF2D4A, #3D0000);
      background-size: 300% 300%;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      animation: borderRotate 6s linear infinite;
      pointer-events: none;
    }
    @keyframes borderRotate {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .thankyou-container .icon {
      font-size: 4.5rem;
      color: #FF0040;
      margin-bottom: 20px;
      display: inline-block;
      background: linear-gradient(135deg, #3D0000, #FF0040, #FF2D4A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .thankyou-container h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .thankyou-container h1 span {
      background: linear-gradient(135deg, #FF0040, #FF2D4A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .thankyou-container p {
      color: #bbb;
      font-size: 1.15rem;
      line-height: 1.8;
      max-width: 500px;
      margin: 0 auto 25px;
    }
    .thankyou-container .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 40px;
      border-radius: 50px;
      background: linear-gradient(135deg, #3D0000, #FF0040, #FF2D4A);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 35px rgba(255, 0, 64, 0.25);
    }
    .thankyou-container .btn-back:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 16px 50px rgba(255, 0, 64, 0.4);
    }
    .glow-particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FF0040;
      filter: blur(12px);
      opacity: 0.3;
      pointer-events: none;
    }
    @media (max-width: 600px) {
      .thankyou-container { padding: 40px 20px; }
      .thankyou-container h1 { font-size: 2.2rem; }
      .thankyou-container p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="thankyou-container">
    <div class="glow-particle" style="top:10%;left:8%;width:14px;height:14px;filter:blur(20px);opacity:0.4;"></div>
    <div class="glow-particle" style="bottom:15%;right:10%;width:10px;height:10px;filter:blur(16px);opacity:0.3;"></div>
    <div class="icon"><i class="fas fa-check-circle"></i></div>
    <h1>Thank <span>You!</span></h1>
    <p>Your message has been sent successfully. I'll get back to you within 24 hours.</p>
    <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>
</body>
</html>
